openapi: 3.1.0
info:
  title: KidSync Sync Server API
  description: |
    REST API contract for the KidSync zero-knowledge sync server (Kotlin/Ktor).

    The server is a **dumb relay** for end-to-end encrypted data. It assigns
    monotonic sequence numbers, stores encrypted blobs, verifies hash chain
    integrity, and relays operations between devices. The server never sees
    plaintext data, user identities, entity types, or any business content.

    ## Authentication
    Endpoints are divided into three categories:
    - **Public** (`/register`, `/auth/challenge`, `/auth/verify`, `/health`):
      No authentication required.
    - **Authenticated**: Require a valid opaque session token in the
      `Authorization: Bearer` header.
    - **Bucket-scoped**: Authenticated AND the device must have active access
      to the specified bucket (live check against `bucket_access` table).

    The session token is an opaque server-signed token (NOT a JWT). It contains
    only `{ deviceId, signingKey, exp }`. No user ID, no bucket IDs, no email.

    ## Identity Model
    There are no accounts, usernames, emails, or passwords. Each device is
    identified by its Ed25519 signing public key and authenticated via
    challenge-response.

    ## Rate Limiting
    All endpoints return rate-limiting headers:
    - `X-RateLimit-Limit` -- maximum requests per window
    - `X-RateLimit-Remaining` -- remaining requests in current window
    - `X-RateLimit-Reset` -- UTC epoch seconds when the window resets
  version: 2.0.0
  license:
    name: AGPL-3.0-or-later
    identifier: AGPL-3.0-or-later
  contact:
    name: KidSync Project

servers:
  - url: https://api.kidsync.app
    description: Production (EU)
  - url: http://localhost:8080
    description: Local development / self-hosted

tags:
  - name: Registration
    description: Device registration (public key only, no accounts)
  - name: Auth
    description: Ed25519 challenge-response authentication
  - name: Buckets
    description: Anonymous bucket lifecycle and access management
  - name: Sync
    description: Encrypted operation log sync, checkpoints
  - name: Blobs
    description: Encrypted blob storage (receipts, attachments), bucket-scoped
  - name: Snapshots
    description: Encrypted state snapshots for new-device bootstrapping
  - name: Keys
    description: Wrapped DEK distribution and key attestations
  - name: Recovery
    description: Encrypted recovery blob storage
  - name: Push
    description: Push notification token registration
  - name: Health
    description: Server health check

security:
  - sessionAuth: []

paths:
  # =========================================================================
  # Registration
  # =========================================================================
  /register:
    post:
      operationId: registerDevice
      tags: [Registration]
      summary: Register a new device
      description: |
        Registers a new device by presenting its Ed25519 signing public key
        and X25519 encryption public key. No email, no password, no name.

        The server stores only the public keys and assigns a device UUID.
        The signing key must be unique (not already registered).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Device registered
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          description: Signing key already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: SIGNING_KEY_EXISTS
                message: "This signing key is already registered"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # =========================================================================
  # Auth
  # =========================================================================
  /auth/challenge:
    post:
      operationId: authChallenge
      tags: [Auth]
      summary: Request an authentication challenge nonce
      description: |
        Generates a 32-byte random nonce for the specified signing key.
        The nonce is stored server-side with a 60-second TTL and is
        one-time-use (consumed on successful verification).

        The device must be registered (signing key must exist).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChallengeRequest"
      responses:
        "200":
          description: Challenge nonce generated
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeResponse"
        "404":
          description: Signing key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: UNKNOWN_SIGNING_KEY
                message: "The signing key is not registered"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/verify:
    post:
      operationId: authVerify
      tags: [Auth]
      summary: Verify signed challenge and obtain session token
      description: |
        Verifies the Ed25519 signature over the challenge message:
        `msg = nonce || signingKey || serverOrigin || timestamp`

        The server:
        1. Checks the nonce exists and is unused
        2. Checks the nonce has not expired (60s TTL)
        3. Consumes (deletes) the nonce atomically
        4. Reconstructs the challenge message
        5. Verifies the Ed25519 signature
        6. Verifies the client timestamp is within 60s of server time

        On success, returns an opaque session token (not JWT).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRequest"
      responses:
        "200":
          description: Authentication successful
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResponse"
        "400":
          description: |
            Nonce expired, nonce consumed, or timestamp drift too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                nonceExpired:
                  value:
                    error: NONCE_EXPIRED
                    message: "The challenge nonce has expired (60s TTL)"
                nonceConsumed:
                  value:
                    error: NONCE_CONSUMED
                    message: "The nonce has already been used"
                timestampDrift:
                  value:
                    error: TIMESTAMP_DRIFT
                    message: "Client timestamp differs from server by more than 60s"
        "401":
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: INVALID_SIGNATURE
                message: "Ed25519 signature verification failed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # =========================================================================
  # Buckets
  # =========================================================================
  /buckets:
    post:
      operationId: createBucket
      tags: [Buckets]
      summary: Create an anonymous bucket
      description: |
        Creates a new anonymous storage bucket. The creating device's ID is
        recorded for deletion authorization. The device is automatically
        granted access.

        The server does not know what the bucket represents (family,
        organization, personal workspace).
      responses:
        "201":
          description: Bucket created
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/X-RateLimit-Limit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/X-RateLimit-Remaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/X-RateLimit-Reset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBucketResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /buckets/{bucketId}:
    delete:
      operationId: deleteBucket
      tags: [Buckets]
      summary: Delete a bucket (creator only)
      description: |
        Permanently deletes a bucket and all associated data (ops, blobs,
        snapshots, checkpoints, access records, wrapped keys). Only the
        device that created the bucket can delete it.
      parameters:
        - $ref: "#/components/parameters/bucketId"
      responses:
        "204":
          description: Bucket deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Only the bucket creator can delete it
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: NOT_BUCKET_CREATOR
                message: "Only the bucket creator can delete it"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /buckets/{bucketId}/invite:
    post:
      operationId: registerInviteToken
      tags: [Buckets]
      summary: Register an invite token hash
      description: |
        Stores the SHA-256 hash of a client-generated invite token. The
        server never sees the plaintext token. The hash expires after 24
        hours and is single-use.

        Rate limit: maximum 5 active invite tokens per bucket.
      parameters:
        - $ref: "#/components/parameters/bucketId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteRequest"
      responses:
        "201":
          description: Invite token hash stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/BucketAccessDenied"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /buckets/{bucketId}/join:
    post:
      operationId: joinBucket
      tags: [Buckets]
      summary: Redeem an invite token and join a bucket
      description: |
        Verifies that SHA-256(inviteToken) matches a stored invite hash.
        On success, grants the authenticated device access to the bucket
        and marks the invite as used.
      parameters:
        - $ref: "#/components/parameters/bucketId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinRequest"
      responses:
        "200":
          description: Successfully joined the bucket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinResponse"
        "400":
          description: Invite token invalid, expired, or already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                inviteInvalid:
                  value:
                    error: INVITE_INVALID
                    message: "Invite token hash does not match any stored hash"
                inviteExpired:
                  value:
                    error: INVITE_EXPIRED
                    message: "Invite token has expired"
                inviteConsumed:
                  value:
                    error: INVITE_CONSUMED
                    message: "Invite token has already been used"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /buckets/{bucketId}/devices:
    get:
      operationId: listBucketDevices
      tags: [Buckets]
      summary: List devices with access to the bucket
      description: |
        Returns all devices that currently have access to the bucket,
        including their signing and encryption public keys. Only accessible
        to devices with bucket access.
      parameters:
        - $ref: "#/components/parameters/bucketId"
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BucketDevicesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/BucketAccessDenied"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /buckets/{bucketId}/devices/me:
    delete:
      operationId: selfRevoke
      tags: [Buckets]
      summary: Self-revoke (leave bucket)
      description: |
        Removes the authenticated device from the bucket. A device can
        only remove **itself** -- there is no endpoint for removing another
        device. The server enforces `authenticatedDeviceId == requestor`.

        Admin revocation (removing another device) is a client-side concept
        implemented via signed ops inside the encrypted payload.
      parameters:
        - $ref: "#/components/parameters/bucketId"
      responses:
        "204":
          description: Device removed from bucket
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/BucketAccessDenied"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # =========================================================================
  # Sync (Operations)
  # =========================================================================
  /buckets/{bucketId}/ops:
    post:
      operationId: uploadOps
      tags: [Sync]
      summary: Upload encrypted operations
      description: |
        Uploads one or more encrypted operations. The server assigns
        monotonic global sequence numbers and server timestamps.

        Server-side validation (no business logic):
        1. `deviceId` matches the authenticated device
        2. Device has active bucket access
        3. Hash chain continuity (prevHash matches last currentHash)
        4. Hash correctness (recomputed currentHash matches)
        5. Key epoch is known
        6. Payload does not exceed 64 KiB
        7. Batch does not exceed 100 ops

        The server does NOT validate: entity types, operation types,
        state transitions, device sequence, client timestamps, or any
        content inside encryptedPayload.
      parameters:
        - $ref: "#/components/parameters/bucketId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadOpsRequest"
      responses:
        "201":
          description: All operations accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadOpsResponse"
        "207":
          description: Partial success (some ops rejected)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadOpsResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/BucketAccessDenied"
        "409":
          description: Hash chain break
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: HASH_CHAIN_BREAK
                message: "Expected prevHash 'abc123...' but got 'def456...'"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: pullOps
      tags: [Sync]
      summary: Pull operations since a sequence number
      description: |
        Returns operations with `globalSequence > since`, ordered
        ascending. Use `limit` to paginate; when `hasMore` is `true`,
        issue another request with `since` set to the last received
        sequence number.

        Each returned op contains only: globalSequence, deviceId,
        keyEpoch, encryptedPayload, prevHash, currentHash,
        serverTimestamp. No entity types, no client timestamps.
      parameters:
        - $ref: "#/components/parameters/bucketId"
        - name: since
          in: query
          required: true
          description: Return ops with globalSequence strictly greater than this value. Use 0 for the beginning.
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: limit
          in: query
          required: false
          description: Maximum ops to return. Default 100, max 1000.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        "200":
          description: Operations retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullOpsResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/BucketAccessDenied"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /buckets/{bucketId}/checkpoint:
    get:
      operationId: getCheckpoint
      tags: [Sync]
      summary: Get the latest server checkpoint
      description: |
        Returns the latest server-computed checkpoint hash. The checkpoint
        covers a range of operations (every 100 ops) computed as
        `SHA-256(concat(encryptedPayload[start..end]))`.

        Clients verify by independently computing the same hash over their
        local copy of the ops in the range.
      parameters:
        - $ref: "#/components/parameters/bucketId"
      responses:
        "200":
          description: Checkpoint data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckpointResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/BucketAccessDenied"
        "404":
          description: No checkpoint available yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: NO_CHECKPOINT
                message: "No checkpoint available (fewer than 100 ops)"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # =========================================================================
  # Blobs (bucket-scoped)
  # =========================================================================
  /buckets/{bucketId}/blobs:
    post:
      operationId: uploadBlob
      tags: [Blobs]
      summary: Upload an encrypted blob
      description: |
        Uploads an encrypted binary blob scoped to a bucket. Maximum size
        10 MiB. The server stores encrypted bytes and cannot determine
        content type or purpose.
      parameters:
        - $ref: "#/components/parameters/bucketId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, sha256]
              properties:
                file:
                  type: string
                  format: binary
                  description: Encrypted blob payload (max 10 MiB)
                sha256:
                  type: string
                  pattern: "^[0-9a-f]{64}$"
                  description: SHA-256 hex digest of the encrypted bytes
      responses:
        "201":
          description: Blob uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadBlobResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/BucketAccessDenied"
        "413":
          description: Blob exceeds 10 MiB size limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: PAYLOAD_TOO_LARGE
                message: "Blob exceeds 10 MiB limit"
                details:
                  maxBytes: 10485760
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /buckets/{bucketId}/blobs/{blobId}:
    get:
      operationId: downloadBlob
      tags: [Blobs]
      summary: Download an encrypted blob
      description: |
        Downloads the encrypted blob binary. Only accessible to devices
        with access to the bucket that owns the blob.
      parameters:
        - $ref: "#/components/parameters/bucketId"
        - $ref: "#/components/parameters/blobId"
      responses:
        "200":
          description: Encrypted blob binary
          headers:
            Content-Length:
              schema:
                type: integer
                format: int64
              description: Size of the blob in bytes
            X-Blob-SHA256:
              schema:
                type: string
              description: Hex-encoded SHA-256 of the blob
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/BucketAccessDenied"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # =========================================================================
  # Snapshots
  # =========================================================================
  /buckets/{bucketId}/snapshots:
    post:
      operationId: uploadSnapshot
      tags: [Snapshots]
      summary: Upload an encrypted state snapshot
      description: |
        Uploads an encrypted snapshot of the complete bucket state at a
        given sequence number. Used for bootstrapping new devices.

        The snapshot includes an Ed25519 signature from the creating device.
      parameters:
        - $ref: "#/components/parameters/bucketId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [metadata, snapshot]
              properties:
                metadata:
                  type: string
                  contentMediaType: application/json
                  description: |
                    JSON-encoded snapshot metadata:
                    ```json
                    {
                      "atSequence": 1043,
                      "keyEpoch": 1,
                      "sha256": "hex-hash-of-snapshot-bytes",
                      "signature": "base64-ed25519-signature"
                    }
                    ```
                snapshot:
                  type: string
                  format: binary
                  description: Encrypted snapshot binary (max 50 MiB)
      responses:
        "201":
          description: Snapshot uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSnapshotResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/BucketAccessDenied"
        "413":
          description: Snapshot exceeds 50 MiB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: SNAPSHOT_TOO_LARGE
                message: "Snapshot exceeds 50 MiB limit"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /buckets/{bucketId}/snapshots/latest:
    get:
      operationId: getLatestSnapshot
      tags: [Snapshots]
      summary: Get the latest snapshot metadata
      description: |
        Returns metadata for the most recent snapshot, including the
        sequence number it was taken at. The client downloads the snapshot
        binary separately.
      parameters:
        - $ref: "#/components/parameters/bucketId"
      responses:
        "200":
          description: Latest snapshot metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LatestSnapshotResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/BucketAccessDenied"
        "404":
          description: No snapshot available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: NO_SNAPSHOT
                message: "No snapshot available for this bucket"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # =========================================================================
  # Keys (Wrapped DEK + Attestations)
  # =========================================================================
  /keys/wrapped:
    post:
      operationId: uploadWrappedKey
      tags: [Keys]
      summary: Upload a wrapped DEK for a target device
      description: |
        Uploads a bucket DEK that has been wrapped (encrypted) with the
        target device's X25519 public key. Used during device enrollment
        and key rotation.

        The authenticated device must have access to at least one bucket
        in common with the target device.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadWrappedKeyRequest"
      responses:
        "201":
          description: Wrapped key stored
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Target device not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: getWrappedKey
      tags: [Keys]
      summary: Get wrapped DEK for the authenticated device
      description: |
        Retrieves the wrapped DEK for the authenticated device at the
        specified key epoch. If no epoch is specified, the latest is
        returned.
      parameters:
        - name: epoch
          in: query
          required: false
          description: Specific key epoch. If omitted, returns the latest.
          schema:
            type: integer
            format: int32
            minimum: 1
      responses:
        "200":
          description: Wrapped DEK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WrappedKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No wrapped key found for this device/epoch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /keys/attestations:
    post:
      operationId: uploadKeyAttestation
      tags: [Keys]
      summary: Upload a key cross-signature (attestation)
      description: |
        Uploads an Ed25519 signature by the authenticated device over
        another device's identity and encryption key. This provides
        key transparency by creating a verifiable chain of trust rooted
        in the QR code exchange.

        Signature message: `attestedDeviceId (UTF-8) || attestedEncryptionKey (raw 32 bytes)`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadAttestationRequest"
      responses:
        "201":
          description: Attestation stored
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /keys/attestations/{deviceId}:
    get:
      operationId: getKeyAttestations
      tags: [Keys]
      summary: Get attestations for a device
      description: |
        Returns all key attestations (cross-signatures) for the specified
        device. Each attestation proves that a signer has verified the
        device's encryption key via an out-of-band channel.
      parameters:
        - name: deviceId
          in: path
          required: true
          description: UUID of the device to get attestations for
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Attestations list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttestationsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # =========================================================================
  # Recovery
  # =========================================================================
  /recovery:
    post:
      operationId: uploadRecoveryBlob
      tags: [Recovery]
      summary: Upload an encrypted recovery blob
      description: |
        Stores an encrypted recovery blob for the authenticated device.
        The blob contains the device seed and bucket DEKs, encrypted with
        the user's recovery key (BIP39 mnemonic-derived + optional
        passphrase).

        Replaces any existing recovery blob for this device.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadRecoveryRequest"
      responses:
        "201":
          description: Recovery blob stored
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      operationId: getRecoveryBlob
      tags: [Recovery]
      summary: Download encrypted recovery blob
      description: |
        Retrieves the encrypted recovery blob for the authenticated device.
        The client decrypts locally using the recovery key derived from
        the BIP39 mnemonic (+ optional passphrase).
      responses:
        "200":
          description: Recovery blob
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryBlobResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No recovery blob found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # =========================================================================
  # Push
  # =========================================================================
  /push/token:
    post:
      operationId: registerPushToken
      tags: [Push]
      summary: Register a push notification token
      description: |
        Registers or updates the push notification token for the
        authenticated device. Push notifications contain only opaque
        signals (`{"type":"sync","bucket":"bucket-id"}`) with no
        content, entity types, or user information.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushTokenRequest"
      responses:
        "204":
          description: Push token registered
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # =========================================================================
  # Health
  # =========================================================================
  /health:
    get:
      operationId: healthCheck
      tags: [Health]
      summary: Health check
      description: Returns server health status. No authentication required.
      security: []
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Server is unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

# =============================================================================
# Components
# =============================================================================
components:

  # ---------------------------------------------------------------------------
  # Security Schemes
  # ---------------------------------------------------------------------------
  securitySchemes:
    sessionAuth:
      type: http
      scheme: bearer
      description: |
        Opaque server-signed session token (NOT a JWT). Obtained from
        `POST /auth/verify` after Ed25519 challenge-response.

        The token contains only: `{ deviceId, signingKey, exp }`.
        No user ID, no bucket IDs, no email.

        Include in the `Authorization` header as `Bearer <token>`.

  # ---------------------------------------------------------------------------
  # Parameters
  # ---------------------------------------------------------------------------
  parameters:
    bucketId:
      name: bucketId
      in: path
      required: true
      description: UUID of the bucket
      schema:
        type: string
        format: uuid

    blobId:
      name: blobId
      in: path
      required: true
      description: UUID of the blob
      schema:
        type: string
        format: uuid

  # ---------------------------------------------------------------------------
  # Headers
  # ---------------------------------------------------------------------------
  headers:
    X-RateLimit-Limit:
      description: Maximum requests allowed in the current window
      schema:
        type: integer
        format: int32

    X-RateLimit-Remaining:
      description: Requests remaining in the current window
      schema:
        type: integer
        format: int32

    X-RateLimit-Reset:
      description: UTC epoch seconds when the window resets
      schema:
        type: integer
        format: int64

  # ---------------------------------------------------------------------------
  # Reusable Responses
  # ---------------------------------------------------------------------------
  responses:
    InvalidRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: INVALID_REQUEST
            message: "Validation failed"
            details:
              fields:
                - field: signingKey
                  reason: "Must be a valid base64-encoded 32-byte Ed25519 public key"

    Unauthorized:
      description: Authentication required or session token invalid/expired
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: TOKEN_EXPIRED
            message: "Session token has expired. Please re-authenticate."

    BucketAccessDenied:
      description: Device does not have access to this bucket
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: BUCKET_ACCESS_DENIED
            message: "Device does not have access to this bucket"

    NotFound:
      description: Requested resource does not exist
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: NOT_FOUND
            message: "Resource not found"

    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          description: Seconds until the client should retry
          schema:
            type: integer
            format: int32
        X-RateLimit-Limit:
          $ref: "#/components/headers/X-RateLimit-Limit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/X-RateLimit-Remaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/X-RateLimit-Reset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: RATE_LIMITED
            message: "Too many requests. Retry after 30 seconds."
            details:
              retryAfterSeconds: 30

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: INTERNAL_ERROR
            message: "An unexpected error occurred"

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:

    # ---- Error ----
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Machine-readable error code
          enum:
            - INVALID_REQUEST
            - UNAUTHORIZED
            - TOKEN_EXPIRED
            - TOKEN_INVALID
            - UNKNOWN_SIGNING_KEY
            - NONCE_EXPIRED
            - NONCE_CONSUMED
            - INVALID_SIGNATURE
            - TIMESTAMP_DRIFT
            - SIGNING_KEY_EXISTS
            - BUCKET_NOT_FOUND
            - BUCKET_ACCESS_DENIED
            - NOT_BUCKET_CREATOR
            - INVITE_EXPIRED
            - INVITE_CONSUMED
            - INVITE_INVALID
            - HASH_CHAIN_BREAK
            - HASH_MISMATCH
            - INVALID_KEY_EPOCH
            - BATCH_TOO_LARGE
            - PAYLOAD_TOO_LARGE
            - SNAPSHOT_TOO_LARGE
            - NO_SNAPSHOT
            - NO_CHECKPOINT
            - NOT_FOUND
            - RATE_LIMITED
            - INTERNAL_ERROR
        message:
          type: string
          description: Human-readable error description
        details:
          type: object
          description: Additional structured details (contents vary by error code)
          additionalProperties: true

    # ---- Registration ----
    RegisterRequest:
      type: object
      required: [signingKey, encryptionKey]
      properties:
        signingKey:
          type: string
          description: Base64-encoded Ed25519 public key (32 bytes)
        encryptionKey:
          type: string
          description: Base64-encoded X25519 public key (32 bytes)

    RegisterResponse:
      type: object
      required: [deviceId]
      properties:
        deviceId:
          type: string
          format: uuid
          description: Server-assigned device UUID

    # ---- Auth ----
    ChallengeRequest:
      type: object
      required: [signingKey]
      properties:
        signingKey:
          type: string
          description: Base64-encoded Ed25519 public key

    ChallengeResponse:
      type: object
      required: [nonce, expiresAt]
      properties:
        nonce:
          type: string
          description: Base64-encoded 32-byte random nonce
        expiresAt:
          type: string
          format: date-time
          description: ISO 8601 UTC timestamp when the nonce expires (60s TTL)

    VerifyRequest:
      type: object
      required: [signingKey, nonce, timestamp, signature]
      properties:
        signingKey:
          type: string
          description: Base64-encoded Ed25519 public key
        nonce:
          type: string
          description: Base64-encoded nonce from the challenge
        timestamp:
          type: string
          format: date-time
          description: Client's ISO 8601 UTC timestamp (verified within 60s of server time)
        signature:
          type: string
          description: |
            Base64-encoded Ed25519 signature over:
            `nonce (32 bytes) || signingKey (32 bytes) || serverOrigin (UTF-8) || timestamp (UTF-8)`

    VerifyResponse:
      type: object
      required: [sessionToken, expiresIn]
      properties:
        sessionToken:
          type: string
          description: |
            Opaque server-signed session token (NOT a JWT). Contains only
            `{ deviceId, signingKey, exp }`. Use in Authorization header.
        expiresIn:
          type: integer
          format: int32
          description: Token lifetime in seconds (default 3600)

    # ---- Buckets ----
    CreateBucketResponse:
      type: object
      required: [bucketId]
      properties:
        bucketId:
          type: string
          format: uuid
          description: Newly created bucket UUID

    InviteRequest:
      type: object
      required: [tokenHash]
      properties:
        tokenHash:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: SHA-256 hex digest of the plaintext invite token

    InviteResponse:
      type: object
      required: [expiresAt]
      properties:
        expiresAt:
          type: string
          format: date-time
          description: ISO 8601 UTC when the invite expires (24 hours)

    JoinRequest:
      type: object
      required: [inviteToken]
      properties:
        inviteToken:
          type: string
          description: Plaintext invite token (base64url, 43 chars)

    JoinResponse:
      type: object
      required: [bucketId, deviceId]
      properties:
        bucketId:
          type: string
          format: uuid
        deviceId:
          type: string
          format: uuid
          description: The joining device's ID

    BucketDevicesResponse:
      type: object
      required: [devices]
      properties:
        devices:
          type: array
          items:
            $ref: "#/components/schemas/BucketDevice"

    BucketDevice:
      type: object
      required: [deviceId, signingKey, encryptionKey, grantedAt]
      properties:
        deviceId:
          type: string
          format: uuid
        signingKey:
          type: string
          description: Base64-encoded Ed25519 public key
        encryptionKey:
          type: string
          description: Base64-encoded X25519 public key
        grantedAt:
          type: string
          format: date-time
          description: When bucket access was granted

    # ---- Sync ----
    OpInput:
      type: object
      required: [deviceId, keyEpoch, encryptedPayload, prevHash, currentHash]
      properties:
        deviceId:
          type: string
          format: uuid
          description: Must match authenticated device
        keyEpoch:
          type: integer
          format: int32
          minimum: 1
          description: DEK epoch used to encrypt this payload
        encryptedPayload:
          type: string
          description: Base64-encoded AES-256-GCM ciphertext (all metadata inside)
        prevHash:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: Previous hash in per-device chain (64 hex zeros for first op)
        currentHash:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: SHA256(hexDecode(prevHash) + base64Decode(encryptedPayload))

    OpOutput:
      type: object
      required: [globalSequence, deviceId, keyEpoch, encryptedPayload, prevHash, currentHash, serverTimestamp]
      properties:
        globalSequence:
          type: integer
          format: int64
          minimum: 1
          description: Server-assigned monotonic sequence number
        deviceId:
          type: string
          format: uuid
        keyEpoch:
          type: integer
          format: int32
        encryptedPayload:
          type: string
          description: Base64-encoded ciphertext (opaque to server)
        prevHash:
          type: string
          pattern: "^[0-9a-f]{64}$"
        currentHash:
          type: string
          pattern: "^[0-9a-f]{64}$"
        serverTimestamp:
          type: string
          format: date-time
          description: Server UTC timestamp when persisted

    UploadOpsRequest:
      type: object
      required: [ops]
      properties:
        ops:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/OpInput"
          description: Batch of 1-100 operations

    UploadOpsResponse:
      type: object
      required: [accepted]
      properties:
        accepted:
          type: array
          items:
            type: object
            required: [index, globalSequence, serverTimestamp]
            properties:
              index:
                type: integer
                format: int32
                description: Index in the request ops array
              globalSequence:
                type: integer
                format: int64
                description: Server-assigned sequence number
              serverTimestamp:
                type: string
                format: date-time
        rejected:
          type: array
          items:
            type: object
            required: [index, error, message]
            properties:
              index:
                type: integer
                format: int32
              error:
                type: string
                description: Machine-readable error code
              message:
                type: string
                description: Human-readable reason

    PullOpsResponse:
      type: object
      required: [ops, hasMore, latestSequence]
      properties:
        ops:
          type: array
          items:
            $ref: "#/components/schemas/OpOutput"
        hasMore:
          type: boolean
          description: True if more ops exist beyond this page
        latestSequence:
          type: integer
          format: int64
          description: Highest known global sequence on the server

    CheckpointResponse:
      type: object
      required: [checkpoint, latestSequence, nextCheckpointAt]
      properties:
        checkpoint:
          type: object
          required: [startSequence, endSequence, hash, timestamp, opCount]
          properties:
            startSequence:
              type: integer
              format: int64
            endSequence:
              type: integer
              format: int64
            hash:
              type: string
              pattern: "^[0-9a-f]{64}$"
              description: SHA-256 of concatenated encrypted payloads
            timestamp:
              type: string
              format: date-time
            opCount:
              type: integer
              format: int32
        latestSequence:
          type: integer
          format: int64
        nextCheckpointAt:
          type: integer
          format: int64
          description: Sequence number when next checkpoint will be created

    # ---- Blobs ----
    UploadBlobResponse:
      type: object
      required: [blobId, sizeBytes, sha256, uploadedAt]
      properties:
        blobId:
          type: string
          format: uuid
        sizeBytes:
          type: integer
          format: int64
        sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
        uploadedAt:
          type: string
          format: date-time

    # ---- Snapshots ----
    UploadSnapshotResponse:
      type: object
      required: [snapshotId, atSequence]
      properties:
        snapshotId:
          type: string
          format: uuid
        atSequence:
          type: integer
          format: int64
          description: Global sequence number the snapshot was taken at

    LatestSnapshotResponse:
      type: object
      required: [snapshotId, atSequence, keyEpoch, sizeBytes, sha256, signature, deviceId, createdAt]
      properties:
        snapshotId:
          type: string
          format: uuid
        atSequence:
          type: integer
          format: int64
          description: Global sequence number the snapshot represents
        keyEpoch:
          type: integer
          format: int32
          description: DEK epoch used to encrypt the snapshot
        sizeBytes:
          type: integer
          format: int64
        sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: SHA-256 of the encrypted snapshot bytes
        signature:
          type: string
          description: Base64-encoded Ed25519 signature by the creating device
        deviceId:
          type: string
          format: uuid
          description: Device that created the snapshot
        createdAt:
          type: string
          format: date-time

    # ---- Keys ----
    UploadWrappedKeyRequest:
      type: object
      required: [targetDevice, keyEpoch, wrappedDek]
      properties:
        targetDevice:
          type: string
          format: uuid
          description: Device UUID to deliver the wrapped DEK to
        keyEpoch:
          type: integer
          format: int32
          minimum: 1
          description: Key epoch this wrapped DEK belongs to
        wrappedDek:
          type: string
          description: |
            Base64-encoded wrapped DEK envelope (ephemeral public key,
            salt, nonce, ciphertext). See encryption-spec.md Section 10.

    WrappedKeyResponse:
      type: object
      required: [wrappedDek, keyEpoch, wrappedBy]
      properties:
        wrappedDek:
          type: string
          description: Base64-encoded wrapped DEK envelope
        keyEpoch:
          type: integer
          format: int32
        wrappedBy:
          type: string
          format: uuid
          description: Device that wrapped this DEK

    UploadAttestationRequest:
      type: object
      required: [attestedDevice, attestedKey, signature]
      properties:
        attestedDevice:
          type: string
          format: uuid
          description: Device whose encryption key is being attested
        attestedKey:
          type: string
          description: Base64-encoded X25519 public key being attested
        signature:
          type: string
          description: |
            Base64-encoded Ed25519 signature over:
            `attestedDeviceId (UTF-8, 36 bytes) || attestedEncryptionKey (raw 32 bytes)`

    AttestationsResponse:
      type: object
      required: [attestations]
      properties:
        attestations:
          type: array
          items:
            $ref: "#/components/schemas/KeyAttestation"

    KeyAttestation:
      type: object
      required: [signerDevice, attestedDevice, attestedKey, signature, createdAt]
      properties:
        signerDevice:
          type: string
          format: uuid
        attestedDevice:
          type: string
          format: uuid
        attestedKey:
          type: string
          description: Base64-encoded X25519 public key
        signature:
          type: string
          description: Base64-encoded Ed25519 signature
        createdAt:
          type: string
          format: date-time

    # ---- Recovery ----
    UploadRecoveryRequest:
      type: object
      required: [encryptedBlob]
      properties:
        encryptedBlob:
          type: string
          description: |
            Base64-encoded recovery blob (nonce || ciphertext || GCM tag).
            Contains seed + bucketIds + DEKs, encrypted with the recovery
            key derived from BIP39 mnemonic + optional passphrase.

    RecoveryBlobResponse:
      type: object
      required: [encryptedBlob, createdAt]
      properties:
        encryptedBlob:
          type: string
          description: Base64-encoded encrypted recovery blob
        createdAt:
          type: string
          format: date-time

    # ---- Push ----
    PushTokenRequest:
      type: object
      required: [token, platform]
      properties:
        token:
          type: string
          minLength: 1
          maxLength: 4096
          description: Platform-specific push notification token
        platform:
          type: string
          enum: [FCM, APNS]
          description: Push platform (FCM=Android, APNS=iOS)

    # ---- Health ----
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
          description: Server version
        uptime:
          type: integer
          format: int64
          description: Server uptime in seconds
