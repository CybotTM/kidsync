services:
  kidsync-server:
    build: .
    ports:
      - "8080:8080"
    environment:
      KIDSYNC_DB_PATH: /app/data/kidsync.db
      KIDSYNC_BLOB_PATH: /app/data/blobs
      KIDSYNC_SNAPSHOT_PATH: /app/data/snapshots
    volumes:
      - kidsync-data:/app/data
    restart: unless-stopped

volumes:
  kidsync-data:
